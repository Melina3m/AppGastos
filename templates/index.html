<!DOCTYPE html>
<html>

<head>
    <title>Control de Gastos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fuente elegante -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Iconos -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f7f3f5;
            color: #333;
            padding: 15px;
            margin: 0;
        }

        /* CONTENEDOR CENTRADO */
        .container {
            max-width: 500px;
            margin: auto;
        }

        h2 {
            text-align: center;
            font-weight: 500;
            margin-bottom: 20px;
            color: #5a4a4a;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
        }


        input,
        select,
        button {
            width: 100%;
            margin: 8px 0;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        button {
            background: #d8a7b1;
            color: white;
            border: none;
            font-weight: 500;
        }

        button:hover {
            background: #c48c98;
        }

        h3 {
            margin-top: 20px;
            color: #5a4a4a;
            font-weight: 500;
        }

        .card {
            background: white;
            padding: 12px;
            margin-top: 10px;
            border-radius: 12px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info {
            display: flex;
            flex-direction: column;
        }

        .nombre {
            font-weight: 500;
        }

        .fecha {
            font-size: 12px;
            color: #888;
        }

        .monto {
            font-weight: 500;
        }

        .ingreso {
            color: #4CAF50;
        }

        .gasto {
            color: #d9534f;
        }
    </style>
</head>

<body>

<div class="container">

    <h2><i class="fa-solid fa-wallet"></i> Control de Gastos</h2>

    <form method="POST" action="/agregar">
        <select name="tipo">
            <option value="ingreso">Ingreso</option>
            <option value="gasto">Gasto</option>
        </select>

        <input type="text" name="nombre" placeholder="Descripción (si es gasto)">
        <input type="number" name="monto" placeholder="Monto" required>
        <input type="date" name="fecha" required>

        <button type="submit">
            <i class="fa-solid fa-plus"></i> Guardar
        </button>
    </form>

    <h3><i class="fa-solid fa-list"></i> Movimientos</h3>

    <!-- GASTOS -->
    {% for g in gastos %}
    <div class="card">
        <div class="info">
            <span class="nombre">
                <i class="fa-solid fa-receipt"></i> {{g[1]}}
            </span>
            <span class="fecha">{{g[0]}} | {{g[3]}}</span>
        </div>
        <span class="monto gasto">
            - ${{ "{:,.0f}".format(g[2]).replace(",", ".") }}
        </span>
    </div>
    {% endfor %}

    <!-- INGRESOS -->
    {% for i in ingresos %}
    <div class="card">
        <div class="info">
            <span class="nombre">
                <i class="fa-solid fa-arrow-down"></i> Ingreso
            </span>
            <span class="fecha">{{i[0]}} | {{i[2]}}</span>
        </div>
        <span class="monto ingreso">
            + ${{ "{:,.0f}".format(i[1]).replace(",", ".") }}
        </span>
    </div>
    {% endfor %}

</div>

</body>
</html>
